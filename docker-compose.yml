version: '3.8'

services:
  # ====================
  # PostgreSQL 数据库
  # ====================
  postgres:
    image: postgres:17-alpine
    container_name: xraypanel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: xraypanel
      POSTGRES_PASSWORD: xraypanel
      POSTGRES_DB: xraypanel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xraypanel"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ====================
  # Redis 缓存
  # ====================
  redis:
    image: redis:7-alpine
    container_name: xraypanel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ====================
  # Master 主控面板
  # ====================
  master:
    build:
      context: .
      dockerfile: docker/Dockerfile.master
    container_name: xraypanel-master
    restart: unless-stopped
    ports:
      - "12889:12889"
    environment:
      PORT: "12889"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: xraypanel
      DB_PASSWORD: xraypanel
      DB_NAME: xraypanel
      REDIS_ADDR: redis:6379
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - master_data:/app/data

volumes:
  postgres_data:
  redis_data:
  master_data:
